<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized Chatbot Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe7;
        --panel: #fffdf8;
        --border: #d8cfc2;
        --text: #1d1a16;
        --muted: #6b6258;
        --accent: #135d66;
        --accent-hover: #0d4750;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(19, 93, 102, 0.12), transparent 35%),
          linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        width: min(900px, calc(100% - 32px));
        margin: 32px auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 18px 50px rgba(45, 33, 20, 0.08);
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .header p {
        margin: 0;
        color: var(--muted);
      }

      .messages {
        height: 60vh;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        max-width: 80%;
        padding: 14px 16px;
        border-radius: 16px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: #d8edf0;
      }

      .message.assistant {
        align-self: flex-start;
        background: #f6f1e8;
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 20px;
        display: grid;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 100px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .status {
        color: var(--muted);
        min-height: 1.2em;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <h1>Personalized Chatbot Prototype</h1>
        <p>Version 0.1 is a simple passthrough to the OpenAI API.</p>
      </section>

      <section id="messages" class="messages">
        <div class="message assistant">
          Hello. This is the bare-bones prototype. Ask me anything to test the loop.
        </div>
      </section>

      <section class="composer">
        <label for="prompt">Message</label>
        <textarea id="prompt" placeholder="Type your message here..."></textarea>
        <div class="controls">
          <div id="status" class="status"></div>
          <button id="sendButton" type="button">Send</button>
        </div>
      </section>
    </main>

    <script>
      const promptInput = document.getElementById("prompt");
      const sendButton = document.getElementById("sendButton");
      const messagesContainer = document.getElementById("messages");
      const statusLabel = document.getElementById("status");

      const history = [];

      function appendMessage(role, content) {
        const element = document.createElement("div");
        element.className = `message ${role}`;
        element.textContent = content;
        messagesContainer.appendChild(element);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      async function sendMessage() {
        const message = promptInput.value.trim();
        if (!message) {
          return;
        }

        appendMessage("user", message);
        history.push({ role: "user", content: message });
        promptInput.value = "";
        sendButton.disabled = true;
        statusLabel.textContent = "Waiting for reply...";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message,
              history: history.slice(0, -1),
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Request failed.");
          }

          appendMessage("assistant", data.reply);
          history.push({ role: "assistant", content: data.reply });
          statusLabel.textContent = "";
        } catch (error) {
          appendMessage("assistant", `Error: ${error.message}`);
          statusLabel.textContent = "Something went wrong.";
        } finally {
          sendButton.disabled = false;
          promptInput.focus();
        }
      }

      sendButton.addEventListener("click", sendMessage);

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
